# Cloudflare Worker config for the Payment Foundation backend (worker.js)
# Deploy with:  wrangler deploy
#
# 1) Create the KV namespace (one time), then paste the id below:
#      wrangler kv namespace create STORE
#    Wrangler prints an id like:  id = "a1b2c3d4e5f6..."  — copy it into kv_namespaces.id
#
# 2) Secrets are NOT stored in this file. Set each with `wrangler secret put NAME`:
#      ADMIN_EMAIL            your command-board email
#      RESEND_API_KEY         re_...  (sends login codes + payment confirmations)
#      MAIL_FROM              "Marketing <no-reply@yourdomain.com>"  (verified Resend sender)
#      VELIANE_SECRET         shared secret your OWNED sites send in the x-veliane-secret header.
#                             Used by /veliane/signup, /veliane/activity, /veliane/intake AND
#                             /owned/click — this single secret covers every site you own.
#      STRIPE_WEBHOOK_SECRET  whsec_...  (only if you credit purchases via Stripe)
#      CLICKMAGICK_SECRET     only if a NON-owned site's tracker posts to /clickmagick/event
#
# Optional tunables (have safe defaults in code — set only to override):
#      STRIPE_CREDIT          "1" to credit purchases on Stripe webhook (default OFF, so the
#                             owned-site / tracker pipe governs conversions and never double-credits)
#      WARN_IP_CLICKS         per-IP clicks (7-day window) before a worker is auto-warned (default 20)
#      BAN_IP_CLICKS          per-IP clicks before a worker is auto-banned (default 50)
#      HOLD_DAYS              days a signup is held before the day-3 active recheck (default 3)
#      ACTIVE_WINDOW_DAYS     "active" = seen within this many days at recheck (default 2)
#
# NOTE: sessions do NOT expire on a device (persistent token), so there is no SESSION_TTL_HOURS.

name = "marketing-foundation"
main = "worker.js"
compatibility_date = "2024-11-01"

[[kv_namespaces]]
binding = "STORE"
id = "7351968bf87d41979df8a0ebe99cabc7"

# Non-secret defaults may go here if you prefer (optional). Secrets must use `wrangler secret put`.
# [vars]
# WARN_IP_CLICKS = "20"
# BAN_IP_CLICKS  = "50"
