<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Marketing вАФ Payment Foundation</title>
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#0f6e56">
<link rel="apple-touch-icon" href="/apple-touch-icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Marketing">
<link rel="icon" type="image/png" href="/icon-192.png">
<style>
  /* Pure: system fonts only вАФ no web-font fetch, fully offline. */

  :root{
    --paper:#f7f3ec; --card:#fffdf8; --ink:#1c1b17; --ink-soft:#56544c;
    --line:#e4ddcf; --line-strong:#d3c9b5;
    --accent:#0f6e56; --accent-soft:#e1f0ea; --accent-ink:#085041;
    --paid:#3b6d11; --paid-soft:#eaf3de;
    --warn:#854f0b; --danger:#a32d2d;
    --r:14px; --r-sm:10px;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --serif:Georgia,Cambria,'Times New Roman',serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper); color:var(--ink); font-family:var(--sans);
    font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,.025) 1px, transparent 0);
    background-size:22px 22px;
  }
  .wrap{max-width:480px; margin:0 auto; min-height:100%; padding:0 18px 64px;
    background:var(--paper);
    border-left:1px solid var(--line); border-right:1px solid var(--line);
  }
  @media(min-width:520px){ .wrap{box-shadow:0 0 0 1px var(--line), 0 30px 80px -40px rgba(0,0,0,.18)} }

  /* ---- PC dashboard (admin only, wide screens) ---- */
  .wrap.pc{max-width:1180px; padding:0 32px 64px}
  .wrap.pc header.top{padding-top:34px}
  .wrap.pc .brand{font-size:32px}
  .admin-grid{display:grid; grid-template-columns:minmax(0,1.5fr) minmax(0,1fr); gap:20px; align-items:start}
  .acol{display:flex; flex-direction:column; min-width:0}
  .wrap.pc .wlist{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:11px}
  .wrap.pc .wlist .wrow.open{grid-column:1 / -1}
  .wrap.pc .wexp-inline input{max-width:440px}
  .wrap.pc .foot{grid-column:1 / -1}
  @media(max-width:859px){ .wrap.pc{max-width:480px; padding:0 18px 64px} .admin-grid{display:block} .wrap.pc .wlist{display:flex; flex-direction:column} }

  header.top{padding:26px 2px 18px; display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px}
  header.top>.brand{justify-self:start}
  header.top>.pickwrap{justify-self:center; align-self:flex-start; margin-top:4px; display:flex; align-items:flex-start; gap:10px}
  header.top>.who{justify-self:end}
  .brand{font-family:var(--serif); font-weight:500; font-size:26px; letter-spacing:-.02em; line-height:1}
  .brand small{display:block; font-family:var(--sans); font-size:12.5px; font-weight:500; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-soft); margin-top:7px}
  .who{font-size:13px; color:var(--ink-soft); text-align:right; max-width:150px}
  .who b{display:block; color:var(--ink); font-weight:600; font-size:13px}
  .signout{margin-top:4px; font-size:12.5px; color:var(--accent); background:none; border:none; cursor:pointer; text-decoration:underline; padding:0}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:18px; margin-bottom:14px}
  .card h2{font-family:var(--serif); font-weight:500; font-size:18px; letter-spacing:-.01em; margin-bottom:3px}
  .card.sim>summary{font-family:var(--serif); font-weight:500; font-size:18px; letter-spacing:-.01em; cursor:pointer; list-style:none; display:flex; flex-direction:column; gap:3px}
  .card.sim>summary::-webkit-details-marker{display:none}
  .card.sim[open]>summary{margin-bottom:6px}
  .simsum-row{display:flex; align-items:baseline; gap:8px}
  .sim-peek{align-self:center; overflow:hidden; height:26px; line-height:1; font-size:46px; margin-top:2px; pointer-events:none; -webkit-mask-image:linear-gradient(#000 62%,transparent); mask-image:linear-gradient(#000 62%,transparent)}
  .sim-peek .amt{display:inline-block; font-family:var(--mono); font-size:46px; font-weight:600; letter-spacing:-.02em; line-height:1; color:var(--ink); opacity:.6; animation:simpeek 2.6s ease-in-out infinite}
  .card.sim[open] .sim-peek{display:none}
  @keyframes simpeek{0%,100%{transform:translateY(0); opacity:.5} 50%{transform:translateY(-7px); opacity:.85}}
  .card .sub{font-size:13.5px; color:var(--ink-soft); margin-bottom:14px}

  label.fl{display:block; font-size:12.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); margin:0 0 6px 2px}
  input,select{width:100%; font-family:var(--sans); font-size:15px; color:var(--ink);
    background:var(--paper); border:1px solid var(--line-strong); border-radius:var(--r-sm);
    padding:12px 13px; outline:none; transition:border-color .15s, box-shadow .15s}
  input:focus,select:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  input.mono{font-family:var(--mono); letter-spacing:.18em; text-transform:uppercase}
  .field{margin-bottom:13px}
  .row{display:flex; gap:10px}
  .row>*{flex:1}

  button.btn{width:100%; font-family:var(--sans); font-size:15px; font-weight:600; color:#fff;
    background:var(--accent); border:none; border-radius:var(--r-sm); padding:13px; cursor:pointer;
    transition:filter .15s, transform .04s}
  button.btn:hover{filter:brightness(1.07)} button.btn:active{transform:translateY(1px)}
  button.btn.ghost{background:transparent; color:var(--accent-ink); border:1px solid var(--line-strong)}
  button.btn.sm{font-size:13px; padding:9px 13px; width:auto}
  button.btn.pay{background:var(--paid)} button.btn.pay:hover{filter:brightness(1.07)}
  .wbtns{display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end}
  button.btn.rmw{background:transparent; color:var(--danger); border:1px solid #e8c9c9; font-weight:500}
  button.btn.rmw:hover{filter:none; background:#fcebeb; border-color:var(--danger)}
  button.btn:disabled{opacity:.5; cursor:default; filter:none}

  .note{font-size:13px; line-height:1.55; color:var(--ink-soft);
    background:var(--accent-soft); border:1px solid #cfe6dd; border-radius:var(--r-sm);
    padding:11px 13px; margin-bottom:14px}
  .note b{color:var(--accent-ink)}
  .note.warn{color:var(--warn); background:#faeeda; border-color:#f3dcb6}
  .note.warn b{color:var(--warn)}
  .note.good{background:#e7f5ee; border-color:#bfe3d0}
  /* PWA install banner */
  .pwa-banner{position:fixed; left:0; right:0; bottom:0; z-index:90; display:none; gap:12px; align-items:center;
    max-width:480px; margin:0 auto; padding:12px 14px; background:var(--accent-ink); color:#fff;
    box-shadow:0 -8px 30px -12px rgba(0,0,0,.4); font-size:13.5px; line-height:1.4}
  .pwa-banner .pi{flex:1}
  .pwa-banner .pi b{display:block; font-size:14px; margin-bottom:1px}
  .pwa-banner button{font-family:inherit; cursor:pointer; border-radius:8px; border:none; padding:9px 13px; font-size:13px; font-weight:600}
  .pwa-banner .pgo{background:#fff; color:var(--accent-ink)}
  .pwa-banner .px{background:transparent; color:#cfe6dd; border:1px solid #3a6b5d; padding:9px 11px}
  .demo-banner{font-size:13px; color:var(--warn); background:#faeeda; border:1px solid #f3dcb6;
    border-radius:var(--r-sm); padding:9px 12px; margin:0 0 14px; display:flex; gap:8px; align-items:flex-start}
  .demo-banner button{margin-left:auto; background:none;border:none;color:var(--warn);cursor:pointer;font-size:15px;line-height:1;padding:0}

  .code-reveal{font-family:var(--mono); font-size:30px; font-weight:500; letter-spacing:.3em;
    text-align:center; padding:18px; background:var(--paper); border:1px dashed var(--line-strong);
    border-radius:var(--r-sm); margin:4px 0 14px; color:var(--accent-ink)}
  .code-hint{font-size:13px; color:var(--ink-soft); text-align:center; margin-bottom:14px}

  /* worker list rows */
  .wlist{display:flex; flex-direction:column; gap:10px}
  .wrow{border:1px solid var(--line); border-radius:var(--r-sm); padding:13px 14px; background:var(--paper)}
  .wrow .l1{display:flex; align-items:baseline; justify-content:space-between; gap:10px}
  .rank{font-family:var(--mono); font-size:13px; color:var(--ink-soft); min-width:26px}
  .wname{font-weight:600; font-size:15px; flex:1}
  .wcode{font-family:var(--mono); font-size:12.5px; color:var(--accent-ink); background:var(--accent-soft);
    padding:2px 7px; border-radius:6px; letter-spacing:.1em}
  .wmeta{display:flex; align-items:flex-end; justify-content:space-between; margin-top:10px; gap:10px; flex-wrap:wrap}
  .bal{font-family:var(--mono); font-size:21px; font-weight:500; color:var(--ink); letter-spacing:-.01em}
  .bal .cur{font-size:13px; color:var(--ink-soft); margin-right:2px}
  .conf{font-size:13px; color:var(--ink-soft); margin-top:2px}
  .paidflash{color:var(--paid); font-weight:600; font-size:13px; font-family:var(--sans)}

  /* worker self view */
  .selfbal{text-align:center; padding:8px 0 4px}
  .selfbal .cur{font-family:var(--mono); font-size:18px; color:var(--ink-soft); vertical-align:super}
  .selfbal .amt{font-family:var(--mono); font-size:48px; font-weight:500; letter-spacing:-.02em; line-height:1}
  .selfbal .lbl{font-size:12.5px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-soft); margin-top:8px}

  .bar-wrap{margin:18px 2px 6px}
  .bar-top{display:flex; justify-content:space-between; font-size:12.5px; color:var(--ink-soft); margin-bottom:7px; font-family:var(--mono)}
  .bar{height:12px; background:var(--paper); border:1px solid var(--line-strong); border-radius:20px; overflow:hidden}
  .bar i{display:block; height:100%; background:var(--accent); border-radius:20px; transition:width .5s cubic-bezier(.2,.7,.2,1)}
  .bar-foot{font-size:13px; color:var(--ink-soft); margin-top:8px; text-align:center}

  .stat-row{display:flex; gap:10px; margin-top:4px}
  .stat{flex:1; text-align:center; border:1px solid var(--line); border-radius:var(--r-sm); padding:12px 6px; background:var(--paper)}
  .stat .n{font-family:var(--mono); font-size:20px; font-weight:500}
  .stat .k{font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-soft); margin-top:4px}

  .log{display:flex; flex-direction:column; gap:0}
  .logitem{display:flex; justify-content:space-between; gap:10px; padding:10px 2px; border-bottom:1px solid var(--line); font-size:13px}
  .logitem:last-child{border-bottom:none}
  .logitem .t{color:var(--ink-soft); font-size:13px; font-family:var(--mono)}
  .logitem .a{font-family:var(--mono); font-weight:500}
  .logitem .a.minus{color:var(--paid)}
  .tag{font-size:11.5px; font-weight:600; letter-spacing:.04em; padding:1px 6px; border-radius:5px; text-transform:uppercase}
  .tag.pur{background:var(--accent-soft); color:var(--accent-ink)}
  .tag.paid-action{background:#e6f1fb; color:#0c447c}
  .tag.active{background:var(--paid-soft); color:#27500a}

  .empty{font-size:13px; color:var(--ink-soft); text-align:center; padding:18px 0; font-style:italic}
  .divider{height:1px; background:var(--line); margin:16px 0}
  .foot{font-size:12.5px; color:var(--ink-soft); text-align:center; padding:22px 10px 0; line-height:1.6}
  .foot.fline{padding:28px 10px 7px}
  .finenote{font-style:italic; font-size:13px; color:var(--ink-soft); text-align:center; line-height:1.65; padding:16px 16px 12px}
  .seg{display:flex; border:1px solid var(--line-strong); border-radius:var(--r-sm); overflow:hidden; margin-bottom:13px}
  .seg button{flex:1; background:var(--paper); border:none; padding:10px 3px; font-family:var(--sans); font-size:12.5px; font-weight:500; color:var(--ink-soft); cursor:pointer; border-right:1px solid var(--line-strong)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--accent); color:#fff}
  .brandwrap{display:flex; align-items:flex-end; gap:20px}
  .ccy{padding-bottom:2px}
  .ccy select{font-family:var(--mono); font-size:13px; font-weight:500; color:var(--ink);
    background:var(--card); border:1px solid var(--line-strong); border-radius:8px;
    padding:6px 8px; cursor:pointer; outline:none; max-width:120px}
  .ccy select:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .ccode{font-family:var(--mono); font-size:12.5px; color:var(--ink-soft); font-weight:400; margin-left:3px}
  .svc{display:flex; align-items:flex-start; gap:12px; padding:13px 2px; border-bottom:1px solid var(--line)}
  .svc:last-child{border-bottom:none}
  .svc .si{flex:1; min-width:0}
  .svc .sn{font-weight:600; font-size:14px}
  .svc .sd{font-size:13.5px; color:var(--ink-soft); margin-top:1px}
  .svc .su{font-family:var(--mono); font-size:12.5px; color:var(--accent-ink); margin-top:4px; word-break:break-all; opacity:.85}
  .svc .sa{display:flex; gap:6px; flex-shrink:0}
  .svc .sa a, .svc .sa button{font-size:13px; padding:6px 10px; border-radius:8px; border:1px solid var(--line-strong); background:var(--paper); color:var(--accent-ink); cursor:pointer; text-decoration:none; font-family:var(--sans); font-weight:500; white-space:nowrap}
  .svc .sa a:hover, .svc .sa button:hover{border-color:var(--accent)}
  .svc .sa .rm{color:var(--danger); border-color:#e8c9c9}
  .notice{background:var(--accent-soft); border:1px solid #cfe6dd; border-radius:var(--r-sm);
    padding:13px 15px; margin-bottom:14px; display:flex; gap:10px; align-items:flex-start}
  .notice .ni{flex:1; min-width:0}
  .notice .nk{font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--accent-ink); margin-bottom:4px}
  .notice .nt{font-size:14px; color:var(--ink); line-height:1.5; white-space:pre-wrap; word-break:break-word}
  .notice .nicon{color:var(--accent-ink); font-size:16px; line-height:1.3}
  .notice.personal{background:#faeeda; border-color:#f3dcb6}
  .notice.personal .nk{color:#854f0b}
  .notice.personal .nicon{color:#854f0b}
  textarea.msg{width:100%; font-family:var(--sans); font-size:15px; color:var(--ink); background:var(--paper);
    border:1px solid var(--line-strong); border-radius:var(--r-sm); padding:12px 13px; outline:none; min-height:74px; resize:vertical; line-height:1.5}
  textarea.msg:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  .bar-needle{position:relative; height:13px; margin-top:3px}
  .bar-needle i{position:absolute; transform:translateX(-50%); width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-bottom:9px solid var(--accent); transition:left .5s cubic-bezier(.2,.7,.2,1)}
  .bar-scale{display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); font-family:var(--mono); margin-top:1px}
  .earn{display:flex; flex-direction:column; gap:10px; margin-bottom:13px}
  .earn-row{display:flex; align-items:center; justify-content:space-between; gap:12px; border:1px solid var(--line); border-radius:var(--r-sm); padding:13px 14px; background:var(--paper)}
  .earn-row.top{border-color:var(--accent); background:var(--accent-soft)}
  .earn-row .en{font-weight:600; font-size:14.5px}
  .earn-row .ed{font-size:13px; color:var(--ink-soft); margin-top:2px}
  .earn-row .ev{font-family:var(--mono); font-size:22px; font-weight:500; color:var(--accent-ink); white-space:nowrap; text-align:right; line-height:1}
  .earn-row .ev .evk{display:block; font-family:var(--sans); font-size:12px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); margin-top:3px}
  .dust{font-size:11.5px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--warn); background:#faeeda; border:1px solid #f3dcb6; padding:1px 6px; border-radius:5px; margin-left:7px; vertical-align:middle}
  .sim-status{font-size:13px; color:var(--ink-soft); text-align:center; min-height:18px; margin:12px 2px 2px; font-family:var(--mono)}
  .sim-status.ok{color:var(--paid)} .sim-status.bad{color:var(--danger)} .sim-status.wait{color:var(--warn)}
  .sim-btns{display:flex; flex-direction:column; gap:8px; margin-top:10px}
  .sim-btns .btn small{display:block; font-weight:500; font-size:12.5px; opacity:.9; margin-top:3px; text-transform:none; letter-spacing:0; line-height:1.35}
  .sim-reset{margin-top:9px; font-size:12.5px; padding:9px}
  .stamp{user-select:none; -webkit-user-select:none; pointer-events:none; text-align:center; margin:30px 0 8px; line-height:1.25}
  .stamp-top{display:inline-block; font-family:var(--serif); font-size:12.5px; font-weight:500; color:var(--ink-soft); white-space:nowrap}
  .stamp-bot{display:inline-block; font-family:var(--serif); font-size:15px; font-weight:500; color:var(--ink); white-space:nowrap}
  .lksite{border:1px solid var(--line); border-radius:var(--r-sm); padding:11px 12px; margin-bottom:10px; background:var(--paper)}
  .lksh{display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:8px}
  .lksn{font-weight:600; font-size:14px}
  .lksu{font-size:12px; color:var(--ink-soft); word-break:break-all}
  .lkadd{display:flex; flex-direction:column; gap:6px; margin-top:8px}
  .empty.sm{padding:8px; font-size:12.5px}
  .banner{border-radius:var(--r-sm); padding:11px 13px; margin-bottom:12px; font-size:13.5px; line-height:1.45}
  .banner.ban{background:#fbe9e7; border:1px solid #f3c0b8; color:var(--danger); font-weight:600}
  .banner.warnb{background:#faeeda; border:1px solid #f3dcb6; color:var(--warn)}
  .payset{display:flex; gap:8px; margin-top:11px}
  .payset .btn.on{border-color:var(--accent); background:var(--accent-soft); color:var(--accent-ink)}
  .svc.justgen{border:1px solid var(--accent); background:var(--accent-soft); border-radius:var(--r-sm); padding:9px 11px}
  .gtag{font-size:11px; color:var(--accent-ink); border:1px solid var(--accent); border-radius:999px; padding:1px 7px; margin-left:6px; white-space:nowrap}
  .l1[data-expand]{cursor:pointer; display:flex; align-items:center; gap:8px}
  .chev{margin-left:auto; color:var(--ink-soft); font-size:12px; transition:transform .2s ease}
  .wrow.open .chev{transform:rotate(90deg)}
  .wexp{overflow:hidden; margin-top:10px; padding-top:10px; border-top:1px solid var(--line); animation:wexpIn .22s ease both}
  @keyframes wexpIn{from{opacity:0; transform:translateY(-4px); max-height:0}to{opacity:1; transform:none; max-height:640px}}
  .wexp-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
  .wexp-grid>div{background:var(--paper); border:1px solid var(--line); border-radius:var(--r-sm); padding:7px 9px}
  .wexp-grid span{display:block; font-size:11px; color:var(--ink-soft)}
  .wexp-grid b{font-size:15px}
  .wexp-tags{display:flex; gap:6px; flex-wrap:wrap; margin-top:9px}
  .wtag{font-size:11px; border-radius:999px; padding:1px 8px; border:1px solid var(--line)}
  .wtag.ban{color:var(--danger); border-color:#f3c0b8; background:#fbe9e7}
  .wtag.warn{color:var(--warn); border-color:#f3dcb6; background:#faeeda}
  .wtag.req{color:var(--accent-ink); border-color:var(--accent); background:var(--accent-soft)}
  .wexp-links{margin-top:10px}
  .wexp-lh{font-size:11.5px; color:var(--ink-soft); margin-bottom:5px}
  .wexp-link{display:flex; align-items:center; gap:8px; margin-bottom:5px}
  .wexp-link .mono{flex:1; font-size:12px; word-break:break-all; color:var(--ink-soft)}
  .wexp-empty{font-size:12px; color:var(--ink-soft)}
  .genres{border:1px solid var(--accent); background:var(--accent-soft); border-radius:var(--r-sm); padding:12px 13px; margin-bottom:14px}
  .genres-h{font-weight:600; font-size:13px; margin-bottom:6px}
  .genres-link{font-size:13px; word-break:break-all; background:var(--paper); border:1px solid var(--line); border-radius:var(--r-sm); padding:8px 9px}
  .genres-a{display:flex; gap:8px; align-items:center; margin-top:8px}
  .genres-n{font-size:12px; color:var(--accent-ink); margin-top:8px}
  .opt{color:var(--ink-soft); font-weight:400; font-size:11px}

}

function wireLogin(){
  const sc=$("#sendCode");
  if(sc) sc.onclick = async ()=>{
    const email=$("#loginEmail").value.trim();
    if(!/.+@.+\..+/.test(email)){ $("#loginEmail").focus(); return; }
    sc.disabled=true; sc.textContent=t("sending");
    try{
      await api("/auth/request","POST",{ email });
      pendingEmail = email;
      const st=$("#sentTo"); if(st) st.textContent=email;
      $("#step1").classList.add("hide"); $("#step2").classList.remove("hide"); $("#loginCode").focus();
    }catch(e){
      sc.disabled=false; sc.textContent=t("send_code");
      if(e.message==="not_registered"){ alert(t("alert_not_registered")); }
      else if(e.message==="rate_limited"){ alert((e.info && e.info.message) || t("alert_rate_limited")); }
      else { alert(t("alert_send_fail",{e:e.message})); }
    }
  };
  const back=$("#backStep"); if(back) back.onclick=()=>{ pendingEmail=null; $("#step2").classList.add("hide"); $("#step1").classList.remove("hide"); $("#loginCode").value=""; };
  const vc=$("#verifyCode"); if(vc) vc.onclick = async ()=>{
    const code=($("#loginCode").value||"").trim();
    if(!code){ $("#loginCode").focus(); return; }
    vc.disabled=true; vc.textContent=t("checking");
    try{
      const r = await api("/auth/verify","POST",{ email:pendingEmail, code });
      TOKEN=r.token; ROLE=r.role; EMAIL=pendingEmail;
      localStorage.setItem("mf_token",TOKEN); localStorage.setItem("mf_role",ROLE); localStorage.setItem("mf_email",EMAIL);
      if(r.name) localStorage.setItem("mf_name",r.name);
      pendingEmail=null;
      await refresh();
    }catch(e){
      vc.disabled=false; vc.textContent=t("verify_enter");
      alert(e.message==="bad_code" ? t("alert_bad_code") : t("alert_verify_fail",{e:e.message}));
    }
  };
  const apSend=$("#apSend");
  if(apSend) apSend.onclick = async ()=>{
    const name=($("#apName").value||"").trim();
    const email=($("#apEmail").value||"").trim();
    const message=($("#apMsg").value||"").trim();
    if(!name){ $("#apName").focus(); return; }
    if(!/.+@.+\..+/.test(email)){ $("#apEmail").focus(); return; }
    apSend.disabled=true; apSend.textContent=t("apply_sending");
    try{
      await api("/apply","POST",{ name, email, message });
      const f=$("#applyForm"), d=$("#applyDone");
      if(f) f.classList.add("hide");
      if(d) d.classList.remove("hide");
    }catch(e){
      apSend.disabled=false; apSend.textContent=t("apply_send");
      alert((e.info && e.info.message) || t("apply_err",{e:e.message}));
    }
  };
}

function payWorker(id, btn){

function resizePhoto(file, cb){
  const rd=new FileReader();
  rd.onload=()=>{ const img=new Image(); img.onload=()=>{
    let wd=img.width, ht=img.height; const max=600; const s=Math.min(1, (max/Math.max(wd,ht))||1);
    wd=Math.max(1,Math.round(wd*s)); ht=Math.max(1,Math.round(ht*s));
    const c=document.createElement("canvas"); c.width=wd; c.height=ht;
    try{ c.getContext("2d").drawImage(img,0,0,wd,ht); cb(c.toDataURL("image/jpeg",0.82)); }catch(e){ cb(rd.result); }
  }; img.onerror=()=>cb(rd.result); img.src=rd.result; };
  rd.readAsDataURL(file);
}

/* ---------------- WORKER ---------------- */

  const r = DB.meRank||1; const total=DB.meTotal||1; const wc = wcur(w); const sym = ccySym(wc);
  const pending = w.pending||0;
  const pct = Math.round((pending / BAR_FULL) * 100);

  const lastPaid = myPayments[0];

  return `${topBar(t("role_worker"), "")}
  ${demoBanner()}
  ${ w.banned ? `<div class="banner ban">${t("banner_banned")}</div>`
     : w.warned ? `<div class="banner warnb">${t("banner_warned")}</div>` : '' }

      ${w.photo?`<img src="${w.photo}" alt="">`:`<span class="whead-ini">${escapeHtml(initials(w.name))}</span>`}
      ${r===1?`<span class="whead-badge">вШЕ #1</span>`:''}

    <div class="whead-meta">
      <div class="whead-hi">${t("welcome_back")}</div>
      <div class="whead-name">${escapeHtml(w.name.split(" ")[0]||w.name)}</div>
      <div class="whead-mail">${escapeHtml(w.email)}</div>
    </div>
  </div>

    <div class="selfbal">
      <div><span class="cur">${sym}</span><span class="amt">${fmtNum(w.balance,wc)}</span></div>
      <div class="lbl">${t("owed_now",{cur:wc})}</div>
    </div>
    <div class="bar-wrap">
      <div class="bar-top"><span>${t("toward_next",{amt:money(BAR_FULL,wc)})}</span><span>${money(pending,wc)} / ${money(BAR_FULL,wc)}</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
      <div class="bar-needle"><i style="left:${pct}%"></i></div>
      <div class="bar-scale"><span>${money(0,wc)}</span><span>${money(BAR_FULL,wc)}</span></div>
      <div class="bar-foot">${t("bar_foot",{amt:money(BAR_FULL,wc)})}</div>
    </div>
    <div class="divider"></div>
    <div class="stat-row">
      <div class="stat"><div class="n">${w.confirmed}</div><div class="k">${t("stat_results")}</div></div>
      <div class="stat"><div class="n">${money(w.paidTotal||0, wc)}</div><div class="k">${t("stat_paidtotal")}</div></div>
      <div class="stat"><div class="n">#${r}</div><div class="k">${t("stat_rank")}</div></div>
    </div>
  </div>
  <div class="guide-cta"><button type="button" class="guide-link" id="guideOpen">${(GUIDE[curLang]||GUIDE.en).label} вАЇ</button></div>
  ${personalNoteHtml(w)}
  ${noticeWorkerHtml()}
  ${workerLinks(w)}
  <div class="card">
    <h2>${t("earn_title")}</h2>
    <div class="sub">${t("earn_sub")}</div>
    <div class="earn">
      <div class="earn-row top">
        <div><div class="en">${t("earn_result_n")}</div><div class="ed">${t("earn_result_d")}</div></div>
        <div class="ev">+${money(RESULT_VALUE,wc)}<span class="evk">${t("each")}</span></div>
      </div>
      <div class="earn-row">
        <div><div class="en">${t("earn_click_n")} <span class="dust">${t("dust")}</span></div><div class="ed">${t("earn_click_d",{n:CLICKS_PER_POINT,amt:money(1,wc)})}</div></div>
        <div class="ev">+${money(1,wc)}<span class="evk">${t("per_clicks",{n:CLICKS_PER_POINT})}</span></div>
      </div>

    <div class="note good">${t("earn_best",{amt:money(RESULT_VALUE,wc)})}</div>
    <div class="note warn">${t("earn_bannote")}</div>

  <div class="card">
    <h2>${t("pay_status_title")}</h2>

function wireWorker(){
  $("#signout").onclick=signOut;
  { const _g=$("#guideOpen"); if(_g) _g.onclick=openGuide; }
  wireCcy();
  document.querySelectorAll("[data-share]").forEach(b=> b.onclick=()=>{
    const url=b.dataset.share, text=b.dataset.msg||t("share_fallback_title");
    if(navigator.share){ navigator.share({ title:linkLabel({coded:url})||t("share_fallback_title"), text, url }).catch(()=>{}); }
    else { copySvc(b.dataset.msg||url, b); } // no native share (e.g. desktop) -> copy the ready message
  });
  document.querySelectorAll("[data-copy]").forEach(b=> b.onclick=()=> copySvc(b.dataset.copy, b));
  const rp=$("#reqPay"); if(rp) rp.onclick = async ()=>{ try{ await api("/me/payout-request","POST",{ on:true }); await refresh(); }catch(e){ alert(t("alert_update_fail",{e:e.message})); } };
  const bs=$("#bkSave"); if(bs) bs.onclick = async ()=>{
    bs.disabled=true; const lbl=bs.textContent; bs.textContent=t("sending");
    try{
      await api("/me/bank","POST",{ holder:$("#bkName").value.trim(), country:$("#bkCountry").value.trim(), method:$("#bkMethod").value.trim(), details:$("#bkDetails").value.trim(), notes:$("#bkNotes").value.trim() });
      await refresh();
    }catch(e){ bs.disabled=false; bs.textContent=lbl; alert((e.info&&e.info.message)||t("alert_bank_send_fail",{e:e.message})); }
  };
  const hp=$("#holdPay"); if(hp) hp.onclick = async ()=>{ try{ await api("/me/payout-request","POST",{ on:false }); await refresh(); }catch(e){ alert(t("alert_update_fail",{e:e.message})); } };

  // Earning simulation (sandbox вАФ does NOT touch the real balance)
  if($("#simBuy")){
    const sw = workerById(DB.session.workerId) || workerByEmail(DB.session.email);
    const wc = wcur(sw);
    let total=SIM_SEED, carry=0, busy=false;
    const paint=()=>{ const bal=Math.floor(total/BAR_FULL)*BAR_FULL, rem=total%BAR_FULL;
      $("#simBal").textContent=fmtNum(bal,wc); { const _pk=$("#simPeek"); if(_pk) _pk.textContent=fmtNum(bal,wc); } $("#simFill").style.width=rem+"%";
      $("#simNeedle").style.left=rem+"%"; $("#simTop").textContent=money(rem,wc)+" / "+money(BAR_FULL,wc); };
    const status=(m,c)=>{ const s=$("#simStatus"); s.textContent=m; s.className="sim-status"+(c?" "+c:""); };
    $("#simBuy").onclick=()=>{ if(busy) return; total+=RESULT_VALUE; paint(); status(t("sim_st_buy",{amt:money(RESULT_VALUE,wc)}),"ok"); };
    $("#simClick").onclick=()=>{ if(busy) return; carry+=1;
      if(carry>=CLICKS_PER_POINT){ carry-=CLICKS_PER_POINT; total+=1; paint(); status(t("sim_st_click_point",{n:CLICKS_PER_POINT,amt:money(1,wc)}),"ok"); }
      else { status(t("sim_st_click_wait",{carry:carry,n:CLICKS_PER_POINT,more:(CLICKS_PER_POINT-carry),amt:money(1,wc)}),"wait"); } };
    $("#simSign").onclick=()=>{ if(busy) return; busy=true; let d=0;
      const iv=setInterval(()=>{ d=(d+1)%4; status(t("sim_st_signing")+".".repeat(d),"wait"); },300);
      setTimeout(()=>{ clearInterval(iv); busy=false;
        if(Math.random()<0.6){ total+=RESULT_VALUE; paint(); status(t("sim_st_active",{amt:money(RESULT_VALUE,wc)}),"ok"); }
        else { status(t("sim_st_fake",{amt:money(0,wc)}),"bad"); } },1600); };
    $("#simReset").onclick=()=>{ if(busy) return; total=SIM_SEED; carry=0; paint(); status(t("sim_tap_earn")); };
    paint();
  }

  // Stamp вАФ stretch "Paris ¬Ј FRANCE" to exactly the width of "A French Company" above it
  const fitStamp=()=>{
    const a=$("#stampTop"), b=$("#stampBot"); if(!a||!b) return;
    b.style.letterSpacing="0px"; b.style.marginRight="0px";
    const target=a.getBoundingClientRect().width, natural=b.getBoundingClientRect().width;
    if(!(target>0)||!(natural>0)) return;
    const n=Math.max(2, b.textContent.length), ls=(target-natural)/(n-1);
    b.style.letterSpacing=ls+"px"; b.style.marginRight=(-ls)+"px";
  };
  const scheduleFit=()=>{ requestAnimationFrame(fitStamp); setTimeout(fitStamp,160); setTimeout(fitStamp,520); };
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(scheduleFit); }
  scheduleFit();
}

/* ---------- misc ---------- */
function signOut(){
  api("/auth/signout","POST").catch(()=>{}).finally(()=>{
    TOKEN=""; ROLE=""; EMAIL="";
    localStorage.removeItem("mf_token"); localStorage.removeItem("mf_role"); localStorage.removeItem("mf_email"); localStorage.removeItem("mf_name");
    DB.session=null; render();
  });
}
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function initials(name){ const p=String(name||"").trim().split(/\s+/); return (((p[0]||"")[0]||"")+((p[1]||"")[0]||"")).toUpperCase()||"¬Ј"; }

/* seed default currency from device locale on first run (overridable in the header) */
if(!DB.config.currency){ DB.config.currency = localeCurrency(); save(); }
/* re-render when crossing the phone/PC breakpoint */
let _wasWide = isWide();
window.addEventListener("resize", ()=>{
  const w = isWide();
  if(w !== _wasWide){ _wasWide = w; if(DB.session && DB.session.role==="admin") render(); }
});

/* boot: restore the session from the Worker, else show sign-in */
(async ()=>{
  if(TOKEN && ROLE){
    try{ await hydrate(); }
    catch(e){ TOKEN=""; ROLE=""; localStorage.removeItem("mf_token"); localStorage.removeItem("mf_role"); localStorage.removeItem("mf_email"); localStorage.removeItem("mf_name"); }
  }
  render();
  pwaInit();
  wireGuide();
})();

/* PWA: register the service worker + show an install banner (re-shown each launch until installed) */
function pwaInit(){
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("/sw.js").catch(()=>{}); }
  const standalone = ()=> (window.matchMedia && matchMedia("(display-mode: standalone)").matches) || navigator.standalone===true;
  if(standalone()) return; // already installed вАФ nothing to show
  const isiOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  let deferred = null, dismissed = false;

  function ensureBanner(){
    let b = document.getElementById("pwaBanner");
    if(b) return b;
    b = document.createElement("div"); b.id="pwaBanner"; b.className="pwa-banner";
    document.body.appendChild(b);
    return b;
  }
  function close(){ dismissed=true; const b=document.getElementById("pwaBanner"); if(b) b.style.display="none"; }
  function showAndroid(){
    if(dismissed) return;
    const b=ensureBanner();
    b.innerHTML = `<div class="pi"><b>${t("pwa_title")}</b>${t("pwa_android_d")}</div>
      <button class="pgo" id="pwaGo">${t("pwa_install_btn")}</button><button class="px" id="pwaX">вЬХ</button>`;
    b.style.display="flex";
    b.querySelector("#pwaX").onclick=close;
    b.querySelector("#pwaGo").onclick=async ()=>{ if(!deferred) return; deferred.prompt(); try{ await deferred.userChoice; }catch(e){} deferred=null; close(); };
  }
  function showIOS(){
    if(dismissed) return;
    const b=ensureBanner();
    b.innerHTML = `<div class="pi"><b>${t("pwa_title")}</b>${t("pwa_ios_d")}</div>
      <button class="px" id="pwaX">вЬХ</button>`;
    b.style.display="flex";
    b.querySelector("#pwaX").onclick=close;
  }

  window.addEventListener("beforeinstallprompt", (e)=>{ e.preventDefault(); deferred=e; showAndroid(); });
  window.addEventListener("appinstalled", ()=> close());
  if(isiOS) setTimeout(showIOS, 800); // Safari has no prompt event вАФ show the manual hint
}
</script>
